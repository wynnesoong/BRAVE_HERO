// === AUDIO CONTEXT ===
let audioCtx = null;
let masterGain = null;
let musicGain = null;
let sfxGain = null;
let currentMusic = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.3;
  masterGain.connect(audioCtx.destination);
  musicGain = audioCtx.createGain();
  musicGain.gain.value = 0.15;
  musicGain.connect(masterGain);
  sfxGain = audioCtx.createGain();
  sfxGain.gain.value = 0.5;
  sfxGain.connect(masterGain);
}

// === AUDIO NODE POOL (Fix 1b) ===
const MAX_CONCURRENT_NOTES = 12;
let activeNoteCount = 0;

function playNote(freq, duration, type = 'square', gain = 0.3, dest = sfxGain) {
  if (!audioCtx) return;
  if (activeNoteCount >= MAX_CONCURRENT_NOTES) return;
  activeNoteCount++;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  g.gain.value = gain;
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(g);
  g.connect(dest);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
  osc.onended = () => { activeNoteCount--; };
}

function playSfxAttack() {
  playNote(200, 0.1, 'sawtooth', 0.2);
  playNote(300, 0.08, 'square', 0.15);
}

function playSfxHit() {
  playNote(150, 0.15, 'sawtooth', 0.3);
  playNote(80, 0.2, 'square', 0.2);
}

function playSfxDeath() {
  playNote(400, 0.1, 'square', 0.2);
  setTimeout(() => playNote(300, 0.1, 'square', 0.2), 100);
  setTimeout(() => playNote(200, 0.1, 'square', 0.2), 200);
  setTimeout(() => playNote(100, 0.3, 'square', 0.2), 300);
}

function playSfxPickup() {
  playNote(600, 0.08, 'sine', 0.2);
  setTimeout(() => playNote(800, 0.08, 'sine', 0.2), 80);
  setTimeout(() => playNote(1000, 0.15, 'sine', 0.2), 160);
}

function playSfxLevelUp() {
  const notes = [523, 659, 784, 1047];
  notes.forEach((n, i) => setTimeout(() => playNote(n, 0.2, 'sine', 0.25), i * 120));
}

function playSfxBuy() {
  playNote(440, 0.1, 'sine', 0.2);
  setTimeout(() => playNote(554, 0.15, 'sine', 0.2), 100);
}

function playSfxSell() {
  playNote(554, 0.1, 'sine', 0.2);

}

// Music systems (Fix 1b: use note queue with rate limiting)
let musicInterval = null;
let lastMusicNoteTime = 0;
const MIN_MUSIC_NOTE_INTERVAL = 200; // ms between music notes

function stopMusic() {
  if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
}

function playVillageMusic() {
  stopMusic();
  if (!audioCtx) return;
  const melody = [
    [392, 0.3], [440, 0.3], [494, 0.3], [523, 0.6],
    [494, 0.3], [440, 0.3], [392, 0.6],
    [330, 0.3], [349, 0.3], [392, 0.3], [440, 0.6],
    [392, 0.3], [349, 0.3], [330, 0.6],
  ];
  let idx = 0;
  musicInterval = setInterval(() => {
    if (!audioCtx) return;
    const now = performance.now();
    if (now - lastMusicNoteTime < MIN_MUSIC_NOTE_INTERVAL) return;
    lastMusicNoteTime = now;
    const [freq, dur] = melody[idx % melody.length];
    playNote(freq, dur * 0.9, 'sine', 0.08, musicGain);
    playNote(freq * 0.5, dur * 0.9, 'triangle', 0.04, musicGain);
    idx++;
  }, 350);
}

function playCombatMusic() {
  stopMusic();
  if (!audioCtx) return;
  const melody = [
    [220, 0.2], [262, 0.2], [294, 0.2], [330, 0.2],
    [294, 0.2], [262, 0.2], [220, 0.4],
    [196, 0.2], [220, 0.2], [262, 0.2], [294, 0.4],
    [262, 0.2], [220, 0.2], [196, 0.4],
  ];
  let idx = 0;
  musicInterval = setInterval(() => {
    if (!audioCtx) return;
    const now = performance.now();
    if (now - lastMusicNoteTime < MIN_MUSIC_NOTE_INTERVAL) return;
    lastMusicNoteTime = now;
    const [freq, dur] = melody[idx % melody.length];
    playNote(freq, dur * 0.8, 'sawtooth', 0.04, musicGain);
    playNote(freq * 0.5, dur * 0.8, 'square', 0.03, musicGain);
    idx++;
  }, 250);
}

function getEquippedWeapon() {
  if (player.equippedWeapon !== null && player.weapons[player.equippedWeapon]) {
    const w = player.weapons[player.equippedWeapon];
    return { ...WEAPONS[w.type], currentDurability: w.durability, index: player.equippedWeapon };
  }
  return { ...WEAPONS.fist, currentDurability: Infinity, index: null };
}

function damageWeapon() {
  if (player.equippedWeapon !== null && player.weapons[player.equippedWeapon]) {
    player.weapons[player.equippedWeapon].durability--;
    if (player.weapons[player.equippedWeapon].durability <= 0) {
      player.weapons.splice(player.equippedWeapon, 1);
      player.equippedWeapon = null;
      addFloatingText(player.x, player.y - 40, 'Weapon Broke!', '#ff6666');
    }
  }
}

// === VILLAGE GENERATION ===
function generateVillages() {
  villages = [];
  for (let x = VILLAGE_SPACING; x < WORLD_WIDTH - VILLAGE_SPACING; x += VILLAGE_SPACING + Math.random() * 1000) {
    villages.push({
      x: x,
      width: 600,
      buildings: [
        { ox: 80, w: 120, h: 100, type: 'house', color: '#8b6f47' },
        { ox: 260, w: 100, h: 80, type: 'shop', color: '#6b8e5a' },
        { ox: 420, w: 110, h: 90, type: 'house', color: '#9b7653' },
      ],
      npcs: [
        { ox: 200, frame: 0 },
        { ox: 350, frame: 0 },
      ]
    });
  }
}

function isInVillage(x) {
  for (const v of villages) {
    if (x >= v.x && x <= v.x + v.width) return v;
  }
  return null;
}

function isNearShop(px) {
  for (const v of villages) {
    for (const b of v.buildings) {
      if (b.type === 'shop') {
        const shopX = v.x + b.ox + b.w / 2;
        if (Math.abs(px - shopX) < 80) return true;
      }
    }
  }
  return false;
}

// === INPUT ===
document.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (gameState === 'title') {
    initAudio();
    gameState = 'playing';
    playCombatMusic();
    lastMusicState = 'combat';
  }
  if (e.key.toLowerCase() === 's') {
    if (gameState === 'playing') {
      if (isNearShop(player.x)) {
        gameState = 'shop';
      } else {
        gameState = 'menu';
      }
    } else if (gameState === 'menu' || gameState === 'shop') {
      gameState = 'playing';
    }
  }
  if (gameState === 'gameover' && e.key.toLowerCase() === 'r') {
    resetGame();
  }
});

document.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
});

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - rect.left) * (W / rect.width);
  mouse.y = (e.clientY - rect.top) * (H / rect.height);
});

canvas.addEventListener('mousedown', e => {
  if (e.button === 0) {
    mouse.clicked = true;
    mouse.down = true;
    initAudio();
    if (gameState === 'title') {
      gameState = 'playing';
      playCombatMusic();
      lastMusicState = 'combat';
    }
  }
});

canvas.addEventListener('mouseup', e => {
  if (e.button === 0) mouse.down = false;
});

// === PARTICLES ===
function addParticle(x, y, color, count = 5, speed = 3) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * speed * 2,
      vy: -Math.random() * speed - 1,
      life: 30 + Math.random() * 20,
      maxLife: 50,
      color,
      size: 2 + Math.random() * 4,
    });
  }
}

function addFloatingText(x, y, text, color = '#fff', size = 18) {
  floatingTexts.push({ x, y, text, color, life: 60, vy: -2, size });
}

function addLevelUpEffect(x, y) {
  for (let i = 0; i < 30; i++) {
    const angle = (i / 30) * Math.PI * 2;
    particles.push({
      x, y,
      vx: Math.cos(angle) * 4,
      vy: Math.sin(angle) * 4 - 2,
      life: 40 + Math.random() * 20,
      maxLife: 60,
      color: ['#ffd700', '#ffeb3b', '#fff176', '#ffffff'][Math.floor(Math.random() * 4)],
      size: 3 + Math.random() * 4,
    });
  }
}

// === IN-PLACE ARRAY CLEANUP (Fix 1c) ===
function compactArray(arr, predicate) {
  let writeIdx = 0;
  for (let i = 0; i < arr.length; i++) {
    if (predicate(arr[i])) {
      arr[writeIdx] = arr[i];
      writeIdx++;
    }
  }
  arr.length = writeIdx;
}

// === LOOT ===

  lootItems.push({
    x: x + (Math.random() - 0.5) * 30,
    y: y - 10,
    vy: -5 - Math.random() * 3,
    vx: (Math.random() - 0.5) * 4,
    type: 'teeth',
    name: '怪物牙齒',
    grounded: false,
    life: 600,
  });

  // 1/5 chance heart
  if (Math.random() < 0.2) {
    lootItems.push({
      x: x + (Math.random() - 0.5) * 30,
      y: y - 10,
      vy: -6 - Math.random() * 3,
      vx: (Math.random() - 0.5) * 4,
      type: 'heart',
      name: '怪物心臟',
      grounded: false,
      life: 600,
    });
  }

  // Weapon drop
  const tier = MONSTER_TIERS[monster.tierIndex];
  let dropWeapon = null;
  if (tier.weaponDrop && Math.random() < tier.dropChance) {
    dropWeapon = tier.weaponDrop;
  } else if (tier.prevWeapon && Math.random() < (tier.prevChance || 0)) {
    dropWeapon = tier.prevWeapon;
  }
  if (dropWeapon) {
    lootItems.push({
      x: x + (Math.random() - 0.5) * 20,
      y: y - 10,
      vy: -7 - Math.random() * 2,
      vx: (Math.random() - 0.5) * 3,
      type: 'weapon',
      weaponType: dropWeapon,
      name: WEAPONS[dropWeapon].name,
      grounded: false,
      life: 900,
    });
  }
}

// === MONSTER SPAWNING ===
function getMaxMonsters() {
  return Math.min(3 + Math.floor(killCount / 5), 10);
}

function getAvailableTiers() {
  const available = [];
  for (let i = 0; i < MONSTER_TIERS.length; i++) {
    const t = MONSTER_TIERS[i];
    // Must pass both hp threshold AND killCount gate
    const tierNum = t.tier;
    let killGate = 0;
    if (tierNum === 2) killGate = 10;
    else if (tierNum === 3) killGate = 25;
    else if (tierNum === 4) killGate = 50;
    else if (tierNum === 5) killGate = 80;
    if (player.maxHp > t.hpThreshold && killCount >= killGate) {
      available.push(i);
    }
  }
  if (available.length === 0) available.push(0);
  return available;
}

function isValidSpawnPos(x) {
  return x >= 50 && x <= WORLD_WIDTH - 50 && !isInVillage(x);
}

function spawnMonster() {
  const availableIndices = getAvailableTiers();

  // Group available monsters by tier number
  const byTier = {};
  for (const idx of availableIndices) {
    const tn = MONSTER_TIERS[idx].tier;
    if (!byTier[tn]) byTier[tn] = [];
    byTier[tn].push(idx);
  }

  const tierNums = Object.keys(byTier).map(Number).sort((a, b) => a - b);
  const highestTier = tierNums[tierNums.length - 1];
  const secondHighest = tierNums.length > 1 ? tierNums[tierNums.length - 2] : highestTier;

  // Weight: 50% highest tier, 30% second highest, 20% random from all
  let tierIdx;
  const r = Math.random();
  if (r < 0.5 && byTier[highestTier]) {
    const pool = byTier[highestTier];
    tierIdx = pool[Math.floor(Math.random() * pool.length)];
  } else if (r < 0.8 && byTier[secondHighest]) {
    const pool = byTier[secondHighest];
    tierIdx = pool[Math.floor(Math.random() * pool.length)];
  } else {
    tierIdx = availableIndices[Math.floor(Math.random() * availableIndices.length)];
  }

  const tier = MONSTER_TIERS[tierIdx];

  // Try multiple distances and both sides to find a valid position
  let mx = null;
  const distances = [
    W * 0.3 + Math.random() * W * 0.3,
    W * 0.5 + Math.random() * W * 0.3,
    W * 0.15 + Math.random() * W * 0.2,
    W * 0.7 + Math.random() * W * 0.3,
  ];
  const sides = Math.random() < 0.5 ? [1, -1] : [-1, 1];

  for (const d of distances) {
    for (const s of sides) {
      const candidate = player.x + s * d;
      if (isValidSpawnPos(candidate)) {
        mx = candidate;
        break;
      }
    }
    if (mx !== null) break;
  }

  // Last resort: scan nearby village edges for valid spots
  if (mx === null) {
    for (const v of villages) {
      const leftEdge = v.x - 80;
      const rightEdge = v.x + v.width + 80;
      if (Math.abs(leftEdge - player.x) < W * 1.2 && isValidSpawnPos(leftEdge)) {
        mx = leftEdge; break;
      }
      if (Math.abs(rightEdge - player.x) < W * 1.2 && isValidSpawnPos(rightEdge)) {
        mx = rightEdge; break;
      }
    }
  }

  if (mx === null) return;

  const hasWeapon = Math.random() < 0.3;
  const baseW = 36;
  const baseH = 56;

  monsters.push({
    x: mx,
    y: tier.flies ? GROUND_Y - tier.flyHeight : GROUND_Y,
    vx: 0, vy: 0,
    w: baseW * tier.scale,
    h: baseH * tier.scale,
    hp: tier.hp,
    maxHp: tier.hp,
    tierIndex: tierIdx,
    facing: mx > player.x ? -1 : 1,
    walkFrame: 0,
    walkTimer: 0,
    attacking: false,
    attackTimer: 0,
    attackCooldown: 0,
    hurtTimer: 0,
    hasWeapon,
    state: 'patrol',
    patrolDir: Math.random() < 0.5 ? 1 : -1,
    patrolTimer: 60 + Math.random() * 120,
    monsterType: tier.monsterType,
    visible: true,
    phaseTimer: 0,
    enraged: false,
    specialTimer: 0,
  });
}

// === DRAWING HELPERS ===
function drawPixelRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h));
}

// === DRAW PLAYER ===
function drawPlayer(px, py) {
  const f = player.facing;
  const frame = player.walkFrame;
  const isWalking = Math.abs(player.vx) > 0.5;
  const isHurt = player.hurtTimer > 0;

  if (isHurt && Math.floor(player.hurtTimer / 3) % 2 === 0) return;

  ctx.save();
  ctx.translate(px, py);

  // Blue tint when slowed
  if (player.slowTimer > 0) {
    ctx.globalAlpha = 0.7 + Math.sin(gameTime * 0.3) * 0.15;
  }

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, 0, 20, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Legs
  const legOffset = isWalking ? Math.sin(frame * 0.5) * 8 : 0;
  drawPixelRect(-10 + (f > 0 ? 0 : 0), -12 + legOffset * 0.5, 8, 14, '#5d4037');
  drawPixelRect(2, -12 - legOffset * 0.5, 8, 14, '#5d4037');
  // Boots
  drawPixelRect(-12 + (f > 0 ? 0 : 0), -2 + legOffset * 0.5, 10, 4, '#3e2723');
  drawPixelRect(0, -2 - legOffset * 0.5, 10, 4, '#3e2723');

  // Body (green tunic)
  drawPixelRect(-12, -38, 24, 28, '#2e7d32');
  // Tunic detail
  drawPixelRect(-10, -36, 20, 2, '#388e3c');
  drawPixelRect(-8, -30, 16, 2, '#1b5e20');
  // Belt
  drawPixelRect(-12, -14, 24, 4, '#795548');
  drawPixelRect(-4, -15, 8, 6, '#ffd700');

  // Arms
  const weapon = getEquippedWeapon();
  const armY = -30;

  if (player.attacking) {
    const swing = player.attackTimer;
    const angle = (1 - swing / 15) * Math.PI * 0.8 - 0.2;

    // Back arm
    drawPixelRect(-14 * f, armY, 6 * f, 18, '#d4a574');

    ctx.save();
    ctx.translate(12 * f, armY + 4);
    ctx.rotate(angle * f);
    // Forward arm (longer for attack)
    drawPixelRect(0, -3, 22 * f, 8, '#d4a574');

    // Weapon in hand
    if (weapon.index !== null) {
      // Sword
      ctx.fillStyle = weapon.color;
      ctx.fillRect(18 * f, -6, 28 * f, 5);
      ctx.fillStyle = '#fff';
      ctx.fillRect(20 * f, -5, 4 * f, 3);
      // Guard
      ctx.fillStyle = '#8b6914';
      ctx.fillRect(15 * f, -8, 4 * f, 12);
    } else {
      // Fist
      ctx.fillStyle = '#d4a574';
      ctx.fillRect(18 * f, -4, 8, 10);
    }
    ctx.restore();
  } else {
    // Normal arms (longer)
    const armSwing = isWalking ? Math.sin(frame * 0.5) * 6 : 0;
    drawPixelRect(-15 * f, armY + armSwing, 6, 20, '#d4a574');
    // Hand
    drawPixelRect(-15 * f, armY + 18 + armSwing, 7, 6, '#d4a574');

    drawPixelRect(10 * f, armY - armSwing, 6, 20, '#d4a574');
    // Weapon in idle hand
    if (weapon.index !== null) {
      ctx.fillStyle = weapon.color;
      ctx.fillRect(10 * f, armY - armSwing + 10, 4 * f, 24);
      ctx.fillStyle = '#8b6914';
      ctx.fillRect(8 * f, armY - armSwing + 8, 8 * f, 4);
    } else {
      drawPixelRect(10 * f, armY + 18 - armSwing, 7, 6, '#d4a574');
    }
  }

  // Head
  drawPixelRect(-10, -52, 20, 16, '#d4a574');
  // Eyes
  const eyeX = f > 0 ? 2 : -8;
  drawPixelRect(eyeX, -48, 4, 4, '#1a1a2e');
  drawPixelRect(eyeX + 2, -48, 2, 2, '#fff');
  // Mouth
  drawPixelRect(eyeX - 1, -42, 6, 2, '#8d6e63');

  // Hair
  drawPixelRect(-12, -56, 24, 6, '#5d4037');
  drawPixelRect(-12, -54, 4, 10, '#5d4037');
  drawPixelRect(8, -54, 4, 10, '#5d4037');

  // Hat (adventurer cap)
  drawPixelRect(-14, -62, 28, 8, '#2e7d32');
  drawPixelRect(-18, -56, 36, 4, '#1b5e20');
  // Hat gem
  drawPixelRect(-2, -60, 4, 4, '#ff5252');

  // Blue overlay when slowed
  if (player.slowTimer > 0) {
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = '#4dd0e1';
    ctx.fillRect(-18, -62, 36, 66);
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// === DRAW MONSTER (20 unique types) ===
function drawMonster(m) {
  const tier = MONSTER_TIERS[m.tierIndex];
  const f = m.facing;
  const px = m.x - camera.x;
  const py = m.y;
  const isWalking = Math.abs(m.vx) > 0.3;
  const isHurt = m.hurtTimer > 0;

  if (px < -150 || px > W + 150) return;
  if (isHurt && Math.floor(m.hurtTimer / 2) % 2 === 0) return;

  // Phase monsters: skip drawing when invisible
  if (tier.special === 'phase' && !m.visible) return;

  ctx.save();
  ctx.translate(px, py);

  const scale = tier.scale;
  ctx.scale(scale, scale);

  // Shadow assassin transparency
  if (tier.monsterType === 'assassin') {
    ctx.globalAlpha = 0.5;
  }
  // Wraith transparency
  if (tier.monsterType === 'wraith') {
    ctx.globalAlpha = 0.6 + Math.sin(gameTime * 0.1) * 0.2;
  }

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, 0, 16, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  const frame = m.walkFrame;
  const legSwing = isWalking ? Math.sin(frame * 0.6) * 6 : 0;

  switch (tier.monsterType) {
    case 'blob':
      drawMonsterBlob(m, tier, f, frame, isWalking);
      break;
    case 'rat':
      drawMonsterRat(m, tier, f, frame, isWalking);
      break;
    case 'mushroom':
      drawMonsterMushroom(m, tier, f, frame);
      break;
    case 'goblin':
      drawMonsterGoblin(m, tier, f, frame, isWalking, legSwing);
      break;
    case 'bat':
      drawMonsterBat(m, tier, f, frame);
      break;
    case 'ogre':
      drawMonsterOgre(m, tier, f, frame, isWalking, legSwing);
      break;
    case 'mage':
      drawMonsterMage(m, tier, f, frame, isWalking, legSwing);
      break;
    case 'bandit':
      drawMonsterBandit(m, tier, f, frame, isWalking, legSwing);
      break;
    case 'wolf':
      drawMonsterWolf(m, tier, f, frame, isWalking);
      break;
    case 'knight':
      drawMonsterKnight(m, tier, f, frame, isWalking, legSwing);
      break;
    case 'berserker':
      drawMonsterBerserker(m, tier, f, frame, isWalking, legSwing);
      break;
    case 'golem':
      drawMonsterGolem(m, tier, f, frame, isWalking, legSwing);
      break;
    case 'demon':
      drawMonsterDemon(m, tier, f, frame, isWalking, legSwing);
      break;
    case 'assassin':
      drawMonsterAssassin(m, tier, f, frame, isWalking, legSwing);
      break;
    case 'titan':
      drawMonsterTitan(m, tier, f, frame, isWalking, legSwing);
      break;
    case 'witch':
      drawMonsterWitch(m, tier, f, frame, isWalking, legSwing);
      break;
    case 'dragon':
      drawMonsterDragon(m, tier, f, frame, isWalking);
      break;
    case 'wraith':
      drawMonsterWraith(m, tier, f, frame);
      break;
    case 'giant':
      drawMonsterGiant(m, tier, f, frame, isWalking, legSwing);
      break;
    case 'champion':
      drawMonsterChampion(m, tier, f, frame, isWalking, legSwing);
      break;
    default:
      drawMonsterGoblin(m, tier, f, frame, isWalking, legSwing);
      break;
  }

  // HP bar
  if (m.hp < m.maxHp) {
    const barW = 30;
    const hpRatio = m.hp / m.maxHp;
    drawPixelRect(-barW / 2, -58, barW, 4, '#333');
    drawPixelRect(-barW / 2, -58, barW * hpRatio, 4, hpRatio > 0.5 ? '#4caf50' : hpRatio > 0.25 ? '#ff9800' : '#f44336');
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

// --- Individual monster draw functions ---

function drawMonsterBlob(m, tier, f, frame, isWalking) {
  // Bouncing blob
  const bounce = Math.sin(gameTime * 0.15) * 4;
  const squish = 1 + Math.sin(gameTime * 0.15) * 0.1;
  ctx.save();
  ctx.translate(0, bounce);
  ctx.scale(1 / squish, squish);
  // Body (round blob)
  ctx.fillStyle = tier.color;
  ctx.beginPath();
  ctx.ellipse(0, -16, 16, 14, 0, 0, Math.PI * 2);
  ctx.fill();
  // Darker bottom
  ctx.fillStyle = tier.colorDark;
  ctx.beginPath();
  ctx.ellipse(0, -10, 14, 8, 0, Math.PI * 0.2, Math.PI * 0.8);
  ctx.fill();
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(-6, -22, 5, 5);
  ctx.fillRect(2, -22, 5, 5);
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(-4, -21, 3, 3);
  ctx.fillRect(4, -21, 3, 3);
  // Mouth
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(-3, -14, 6, 2);
  ctx.restore();
}

function drawMonsterRat(m, tier, f, frame, isWalking) {
  const legSwing = isWalking ? Math.sin(frame * 0.8) * 4 : 0;
  // Small low body
  // 4 legs
  ctx.fillStyle = tier.colorDark;
  ctx.fillRect(-10, -6 + legSwing, 4, 8);
  ctx.fillRect(-3, -6 - legSwing, 4, 8);
  ctx.fillRect(3, -6 + legSwing, 4, 8);
  ctx.fillRect(10, -6 - legSwing, 4, 8);
  // Body (elongated)
  ctx.fillStyle = tier.color;
  ctx.fillRect(-12, -16, 24, 12);
  // Head
  ctx.fillRect(10 * f, -20, 10 * f, 10);
  // Pointed nose
  ctx.fillStyle = '#e0a0a0';
  ctx.fillRect(18 * f, -16, 4 * f, 4);
  // Ears
  ctx.fillStyle = tier.colorDark;
  ctx.fillRect(12 * f, -24, 4, 5);
  ctx.fillRect(18 * f, -24, 4, 5);
  // Eyes
  ctx.fillStyle = '#ff0000';
  ctx.fillRect(14 * f, -18, 2, 2);
  // Tail
  ctx.fillStyle = tier.colorDark;
  ctx.fillRect(-14 * f, -14, -16 * f, 2);
  ctx.fillRect(-28 * f, -16, -4 * f, 2);
}

function drawMonsterMushroom(m, tier, f, frame) {
  // Stem
  ctx.fillStyle = '#d7ccc8';
  ctx.fillRect(-8, -24, 16, 24);
  ctx.fillStyle = '#bcaaa4';
  ctx.fillRect(-6, -20, 12, 16);
  // Cap (half circle)
  ctx.fillStyle = tier.color;
  ctx.beginPath();
  ctx.arc(0, -24, 20, Math.PI, 0);
  ctx.fill();
  // Spots
  ctx.fillStyle = tier.colorDark;
  ctx.beginPath(); ctx.arc(-8, -32, 4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(6, -34, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(0, -28, 3, 0, Math.PI * 2); ctx.fill();
  // Eyes
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(-5, -18, 3, 4);
  ctx.fillRect(3, -18, 3, 4);
}

function drawMonsterGoblin(m, tier, f, frame, isWalking, legSwing) {
  // Legs
  drawPixelRect(-8, -10 + legSwing * 0.3, 6, 12, tier.colorDark);
  drawPixelRect(2, -10 - legSwing * 0.3, 6, 12, tier.colorDark);
  // Body
  drawPixelRect(-12, -34, 24, 26, tier.color);
  drawPixelRect(-8, -28, 16, 8, tier.colorDark);
  // Arms
  if (m.attacking) {
    const swing = m.attackTimer;
    const angle = (1 - swing / 20) * Math.PI * 0.7;
    ctx.save();
    ctx.translate(10 * f, -26);
    ctx.rotate(angle * f);
    drawPixelRect(0, -3, 18 * f, 7, tier.color);
    if (m.hasWeapon) {
      ctx.fillStyle = '#666';
      ctx.fillRect(14 * f, -5, 20 * f, 4);
    } else {
      drawPixelRect(14 * f, -4, 8, 8, tier.colorDark);
    }
    ctx.restore();
    drawPixelRect(-12 * f, -28 + legSwing, 6, 16, tier.color);
  } else {
    const armSwing = isWalking ? Math.sin(frame * 0.6) * 5 : 0;
    drawPixelRect(-14 * f, -28 + armSwing, 6, 16, tier.color);
    drawPixelRect(10 * f, -28 - armSwing, 6, 16, tier.color);
    if (m.hasWeapon) {
      ctx.fillStyle = '#666';
      ctx.fillRect(12 * f, -24 - armSwing, 3 * f, 20);
    }
  }
  // Head
  drawPixelRect(-10, -48, 20, 16, tier.color);
  // Horns
  drawPixelRect(-12, -54, 6, 8, tier.colorDark);
  drawPixelRect(6, -54, 6, 8, tier.colorDark);
  // Eyes
  const eyeX = f > 0 ? 0 : -8;
  drawPixelRect(eyeX, -44, 6, 4, '#fff');
  drawPixelRect(eyeX + 2, -43, 3, 3, '#ff0000');
  // Mouth
  drawPixelRect(eyeX - 2, -38, 10, 3, '#000');
  drawPixelRect(eyeX, -36, 2, 3, '#fff');
  drawPixelRect(eyeX + 5, -36, 2, 3, '#fff');
}

function drawMonsterBat(m, tier, f, frame) {
  const wingFlap = Math.sin(gameTime * 0.3) * 0.6;
  // Body (small)
  ctx.fillStyle = tier.color;
  ctx.fillRect(-6, -14, 12, 10);
  // Wings
  ctx.save();
  ctx.translate(-6, -12);
  ctx.rotate(-wingFlap);
  ctx.fillStyle = tier.colorDark;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(-20, -10);
  ctx.lineTo(-18, 5);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
  ctx.save();
  ctx.translate(6, -12);
  ctx.rotate(wingFlap);
  ctx.fillStyle = tier.colorDark;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(20, -10);
  ctx.lineTo(18, 5);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
  // Eyes
  ctx.fillStyle = '#ff0000';
  ctx.fillRect(-4, -12, 3, 3);
  ctx.fillRect(2, -12, 3, 3);
  // Fangs
  ctx.fillStyle = '#fff';
  ctx.fillRect(-2, -5, 2, 4);
  ctx.fillRect(1, -5, 2, 4);
  // Ears
  ctx.fillStyle = tier.color;
  ctx.beginPath();
  ctx.moveTo(-5, -14); ctx.lineTo(-8, -22); ctx.lineTo(-2, -14);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(5, -14); ctx.lineTo(8, -22); ctx.lineTo(2, -14);
  ctx.fill();
}

function drawMonsterOgre(m, tier, f, frame, isWalking, legSwing) {
  // Short thick legs
  drawPixelRect(-10, -10 + legSwing * 0.3, 8, 12, tier.colorDark);
  drawPixelRect(2, -10 - legSwing * 0.3, 8, 12, tier.colorDark);
  // Big round body
  ctx.fillStyle = tier.color;
  ctx.beginPath();
  ctx.ellipse(0, -28, 16, 18, 0, 0, Math.PI * 2);
  ctx.fill();
  // Belly
  ctx.fillStyle = tier.colorDark;
  ctx.beginPath();
  ctx.ellipse(0, -22, 12, 10, 0, 0, Math.PI * 2);
  ctx.fill();

  const armSwing = isWalking ? Math.sin(frame * 0.6) * 5 : 0;
  drawPixelRect(-18, -34 + armSwing, 8, 22, tier.color);
  drawPixelRect(10, -34 - armSwing, 8, 22, tier.color);

  drawPixelRect(-10, -50, 20, 16, tier.color);

  const eyeX = f > 0 ? -2 : -8;

  ctx.fillRect(eyeX + 2, -45, 2, 2);
  ctx.fillRect(eyeX + 8, -45, 2, 2);

  ctx.fillStyle = tier.colorDark;
  ctx.fillRect(-6, -38, 12, 4);
  ctx.fillStyle = '#fff';
  ctx.fillRect(-4, -40, 3, 4);
  ctx.fillRect(2, -40, 3, 4);
}

function drawMonsterMage(m, tier, f, frame, isWalking, legSwing) {

  ctx.moveTo(-14, 0);

  ctx.lineTo(14, 0);

  ctx.fillStyle = tier.colorDark;
  ctx.beginPath();
  ctx.moveTo(-10, 0);
  ctx.lineTo(0, -28);
  ctx.lineTo(10, 0);
  ctx.fill();
  // Head
  drawPixelRect(-8, -46, 16, 12, '#d4a574');
  // Pointy wizard hat
  ctx.fillStyle = tier.color;

  ctx.moveTo(-12, -46);
  ctx.lineTo(0, -70);
  ctx.lineTo(12, -46);
  ctx.fill();
  ctx.fillStyle = tier.colorDark;
  ctx.fillRect(-14, -48, 28, 4);

  ctx.fillRect(-4, -42, 3, 3);
  ctx.fillRect(2, -42, 3, 3);
  ctx.fillStyle = '#6a1b9a';

function drawMonsterBandit(m, tier, f, frame, isWalking, legSwing) {

// === BACKGROUND CACHING (Fix 1a) ===
let bgCache = null;
let bgCacheValid = false;

function buildBackgroundCache() {
  if (!bgCache) {
    bgCache = document.createElement('canvas');
    bgCache.width = W;
    bgCache.height = H;
  }
  const bgCtx = bgCache.getContext('2d');

  // Sky gradient
  const grad = bgCtx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1a237e');
  grad.addColorStop(0.3, '#283593');
  grad.addColorStop(0.5, '#5c6bc0');
  grad.addColorStop(0.7, '#7986cb');
  grad.addColorStop(1, '#9fa8da');
  bgCtx.fillStyle = grad;
  bgCtx.fillRect(0, 0, W, H);

  // Stars (static, no twinkle on cached layer)
  bgCtx.fillStyle = '#fff';
  for (let i = 0; i < 60; i++) {
    const sx = ((i * 137 + 50) % W);
    const sy = ((i * 97 + 30) % (H * 0.4));
    bgCtx.globalAlpha = 0.5;
    bgCtx.fillRect(sx, sy, 2, 2);
  }
  bgCtx.globalAlpha = 1;

  // Moon
  bgCtx.fillStyle = '#ffe082';
  bgCtx.beginPath();
  bgCtx.arc(1000, 80, 40, 0, Math.PI * 2);
  bgCtx.fill();
  bgCtx.fillStyle = '#1a237e';
  bgCtx.beginPath();
  bgCtx.arc(1015, 75, 35, 0, Math.PI * 2);
  bgCtx.fill();

  bgCacheValid = true;
}

// === DRAW BACKGROUND (Fix 1a: use cached static layer) ===
function drawBackground() {
  if (!bgCacheValid) buildBackgroundCache();

  // Draw cached sky/stars/moon
  ctx.drawImage(bgCache, 0, 0);

  // Distant mountains (parallax) - dynamic but simple
  const px1 = -camera.x * 0.1;
  ctx.fillStyle = '#1a3a5c';
  for (let i = -1; i < 4; i++) {
    const mx = i * 600 + (px1 % 600);
    ctx.beginPath();
    ctx.moveTo(mx - 100, GROUND_Y + 20);
    ctx.lineTo(mx + 200, GROUND_Y - 200);
    ctx.lineTo(mx + 500, GROUND_Y + 20);
    ctx.fill();
  }

  // Closer mountains
  const px2 = -camera.x * 0.2;
  ctx.fillStyle = '#1e4d3d';
  for (let i = -1; i < 5; i++) {
    const mx = i * 450 + (px2 % 450);
    ctx.beginPath();
    ctx.moveTo(mx - 80, GROUND_Y + 20);
    ctx.lineTo(mx + 150, GROUND_Y - 140);
    ctx.lineTo(mx + 380, GROUND_Y + 20);
    ctx.fill();
  }

  // Trees in background (parallax) - simplified
  const px3 = -camera.x * 0.35;
  for (let i = -1; i < 12; i++) {
    const tx = i * 160 + (px3 % 160);
    const th = 60 + (i * 37 % 40);
    // Trunk
    ctx.fillStyle = '#3e2723';
    ctx.fillRect(tx + 10, GROUND_Y - th + 20, 8, th - 20);
    // Canopy (single triangle instead of two)
    ctx.fillStyle = '#1b5e20';
    ctx.beginPath();
    ctx.moveTo(tx - 10, GROUND_Y - th + 25);
    ctx.lineTo(tx + 14, GROUND_Y - th - 30);
    ctx.lineTo(tx + 38, GROUND_Y - th + 25);
    ctx.fill();
    ctx.fillStyle = '#2e7d32';
    ctx.beginPath();
    ctx.moveTo(tx - 5, GROUND_Y - th + 10);
    ctx.lineTo(tx + 14, GROUND_Y - th - 15);
    ctx.lineTo(tx + 33, GROUND_Y - th + 10);
    ctx.fill();
  }
}

// === DRAW GROUND (Fix 1d: reduced grass detail) ===
function drawGround() {
  // Grass top
  const startTile = Math.floor(camera.x / 64) - 1;
  const endTile = startTile + Math.ceil(W / 64) + 2;

  for (let i = startTile; i <= endTile; i++) {
    const tx = i * 64 - camera.x;

    // Dirt
    ctx.fillStyle = '#5d4037';
    ctx.fillRect(tx, GROUND_Y, 64, 100);

    // Grass
    ctx.fillStyle = '#4caf50';
    ctx.fillRect(tx, GROUND_Y - 4, 64, 12);
    ctx.fillStyle = '#66bb6a';
    ctx.fillRect(tx, GROUND_Y - 4, 64, 6);

    // Fix 1d: Fewer grass blades (2 instead of 5)
    ctx.fillStyle = '#388e3c';
    for (let g = 0; g < 2; g++) {
      const gx = tx + g * 30 + (i * 7 % 10);
      const gh = 6 + (i * 3 + g * 5) % 8;
      ctx.fillRect(gx, GROUND_Y - gh, 2, gh);
    }

    // Dirt texture (1 instead of 3)
    ctx.fillStyle = '#4e342e';
    const dx = tx + (i * 13) % 56;
    const dy = GROUND_Y + 20 + (i * 7) % 60;
    ctx.fillRect(dx, dy, 6, 3);
  }
}

// === DRAW VILLAGE ===
function drawVillage(v) {
  const vx = v.x - camera.x;
  if (vx + v.width < -100 || vx > W + 100) return;

  // Village ground (cobblestone)
  ctx.fillStyle = '#9e9e9e';
  ctx.fillRect(vx, GROUND_Y - 2, v.width, 8);
  for (let i = 0; i < v.width; i += 20) {
    ctx.fillStyle = (Math.floor(i / 20) % 2 === 0) ? '#8d8d8d' : '#a0a0a0';
    ctx.fillRect(vx + i, GROUND_Y - 2, 18, 6);
  }

  // Buildings
  for (const b of v.buildings) {
    const bx = vx + b.ox;
    const by = GROUND_Y - b.h;

    // Wall
    ctx.fillStyle = b.color;
    ctx.fillRect(bx, by, b.w, b.h);

    // Wall detail
    ctx.fillStyle = shadeColor(b.color, -20);
    ctx.fillRect(bx + 2, by + 2, b.w - 4, 4);

    // Roof
    ctx.fillStyle = '#c62828';
    ctx.beginPath();
    ctx.moveTo(bx - 10, by);
    ctx.lineTo(bx + b.w / 2, by - 30);
    ctx.lineTo(bx + b.w + 10, by);
    ctx.fill();

    ctx.fillStyle = '#b71c1c';
    ctx.beginPath();
    ctx.moveTo(bx - 5, by);
    ctx.lineTo(bx + b.w / 2, by - 25);
    ctx.lineTo(bx + b.w + 5, by);
    ctx.fill();

    // Window
    ctx.fillStyle = '#ffeb3b';
    ctx.fillRect(bx + 15, by + 20, 16, 16);
    ctx.fillRect(bx + b.w - 31, by + 20, 16, 16);
    // Window cross
    ctx.fillStyle = '#5d4037';
    ctx.fillRect(bx + 22, by + 20, 2, 16);
    ctx.fillRect(bx + 15, by + 27, 16, 2);

    // Door
    ctx.fillStyle = '#3e2723';
    ctx.fillRect(bx + b.w / 2 - 10, by + b.h - 30, 20, 30);
    ctx.fillStyle = '#ffd700';
    ctx.fillRect(bx + b.w / 2 + 5, by + b.h - 16, 3, 3);

    // Shop sign
    if (b.type === 'shop') {
      ctx.fillStyle = '#5d4037';
      ctx.fillRect(bx + b.w + 5, by + 10, 4, 40);
      ctx.fillStyle = '#fff8e1';
      ctx.fillRect(bx + b.w - 5, by + 5, 30, 20);
      ctx.fillStyle = '#333';
      ctx.font = '10px monospace';
      ctx.fillText('商店', bx + b.w - 1, by + 19);
    }
  }

  // NPCs
  for (const npc of v.npcs) {
    const nx = vx + npc.ox;
    const ny = GROUND_Y;

    ctx.save();
    ctx.translate(nx, ny);

    // Simple villager
    // Body
    drawPixelRect(-8, -30, 16, 20, '#5c6bc0');
    // Head
    drawPixelRect(-7, -42, 14, 14, '#d4a574');
    // Hair
    drawPixelRect(-8, -46, 16, 6, '#5d4037');
    // Eyes
    drawPixelRect(-3, -39, 3, 3, '#333');
    drawPixelRect(3, -39, 3, 3, '#333');
    // Legs
    drawPixelRect(-6, -12, 5, 14, '#3949ab');
    drawPixelRect(1, -12, 5, 14, '#3949ab');

    ctx.restore();
  }

  // Flowers and decorations
  for (let i = 0; i < 6; i++) {
    const fx = vx + 30 + i * 100;
    const fy = GROUND_Y - 6;
    ctx.fillStyle = ['#e91e63', '#ff9800', '#9c27b0', '#ffeb3b', '#4caf50', '#2196f3'][i % 6];
    ctx.fillRect(fx, fy - 4, 4, 4);
    ctx.fillRect(fx - 2, fy - 2, 2, 2);
    ctx.fillRect(fx + 4, fy - 2, 2, 2);
    ctx.fillStyle = '#4caf50';
    ctx.fillRect(fx + 1, fy, 2, 6);
  }
}

function shadeColor(color, percent) {
  const num = parseInt(color.replace('#', ''), 16);
  const r = Math.min(255, Math.max(0, (num >> 16) + percent));
  const g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + percent));
  const b = Math.min(255, Math.max(0, (num & 0x0000FF) + percent));
  return '#' + (0x1000000 + r * 0x10000 + g * 0x100 + b).toString(16).slice(1);
}

// === DRAW LOOT ITEMS ===
function drawLootItem(item) {
  const ix = item.x - camera.x;
  const iy = item.y;
  if (ix < -50 || ix > W + 50) return;

  const bob = Math.sin(gameTime * 0.08 + item.x) * 3;

  ctx.save();
  ctx.translate(ix, iy + bob);

  if (item.type === 'teeth') {
    // Tooth shape
    ctx.fillStyle = '#e0e0e0';
    ctx.fillRect(-4, -10, 8, 10);
    ctx.fillStyle = '#bdbdbd';
    ctx.fillRect(-2, -12, 4, 4);
    // Sparkle
    ctx.fillStyle = '#fff';
    ctx.fillRect(-1, -8, 2, 2);
  } else if (item.type === 'heart') {
    // Heart shape
    ctx.fillStyle = '#e91e63';
    ctx.beginPath();
    ctx.arc(-3, -10, 5, 0, Math.PI * 2);
    ctx.arc(3, -10, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-8, -8);
    ctx.lineTo(0, 2);
    ctx.lineTo(8, -8);
    ctx.fill();
  } else if (item.type === 'weapon') {
    const wColor = WEAPONS[item.weaponType].color;
    // Sword on ground
    ctx.fillStyle = wColor;
    ctx.fillRect(-12, -6, 24, 4);
    ctx.fillStyle = '#8b6914';
    ctx.fillRect(-2, -8, 4, 8);
    // Sparkle
    if (Math.floor(gameTime / 10) % 3 === 0) {
      ctx.fillStyle = '#fff';
      ctx.fillRect(8, -10, 3, 3);
    }
  }

  ctx.restore();
}

// === DRAW HUD ===
function drawHUD() {
  // Hearts

    ctx.fillRect(W - 195, 18, 5, 12);
  } else {

  }

  ctx.fillStyle = '#fff';

  ctx.fillStyle = '#e0e0e0';

  // Kill count
  ctx.fillStyle = '#ff8a80';

  if (player.slowTimer > 0) {
    ctx.fillStyle = '#4dd0e1';
    ctx.font = '14px monospace';
    ctx.fillText('❄ SLOWED', 80, 105);
  }

  // Village hint
  if (isNearShop(player.x)) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(W / 2 - 100, H - 60, 200, 30);
    ctx.fillStyle = '#ffd700';
    ctx.font = '16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('按 S 開啟商店', W / 2, H - 40);
    ctx.textAlign = 'left';
  } else if (isInVillage(player.x)) {
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(W / 2 - 80, H - 55, 160, 24);
    ctx.fillStyle = '#a5d6a7';
    ctx.font = '14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('🏘️ 安全區域', W / 2, H - 38);
    ctx.textAlign = 'left';
  }
}

function drawHeart(x, y, color1, color2, half = false) {
  if (half) {
    // Draw full colored heart first
    ctx.fillStyle = color1;
    ctx.beginPath();
    ctx.arc(x + 5, y + 4, 6, 0, Math.PI * 2);
    ctx.arc(x + 15, y + 4, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x - 1, y + 6);
    ctx.lineTo(x + 10, y + 18);
    ctx.lineTo(x + 21, y + 6);
    ctx.fill();
    // Grey right half
    ctx.save();
    ctx.beginPath();
    ctx.rect(x + 10, y - 4, 14, 26);
    ctx.clip();
    ctx.fillStyle = '#555';
    ctx.beginPath();
    ctx.arc(x + 5, y + 4, 6, 0, Math.PI * 2);
    ctx.arc(x + 15, y + 4, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x - 1, y + 6);
    ctx.lineTo(x + 10, y + 18);
    ctx.lineTo(x + 21, y + 6);
    ctx.fill();
    ctx.restore();
  } else {
    ctx.fillStyle = color1;
    ctx.beginPath();
    ctx.arc(x + 5, y + 4, 6, 0, Math.PI * 2);
    ctx.arc(x + 15, y + 4, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x - 1, y + 6);
    ctx.lineTo(x + 10, y + 18);
    ctx.lineTo(x + 21, y + 6);
    ctx.fill();
  }
}

// === DRAW MENU ===
function drawMenu() {
  // Overlay
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);

  // Menu frame
  const mx = 200, my = 80, mw = W - 400, mh = H - 160;
  drawMenuFrame(mx, my, mw, mh, 'BRAVE HERO - 選單');

  // Stats
  ctx.fillStyle = '#fff';
  ctx.font = '18px monospace';
  let y = my + 60;
  ctx.fillText('等級: ' + player.level, mx + 30, y); y += 28;
  ctx.fillText('生命: ' + player.hp.toFixed(1) + ' / ' + player.maxHp, mx + 30, y); y += 28;
  ctx.fillText('金幣: ' + player.money, mx + 30, y); y += 28;
  ctx.fillText('擊殺: ' + killCount, mx + 30, y); y += 28;
  ctx.fillText('怪物牙齒: ' + player.teeth, mx + 30, y); y += 28;
  ctx.fillText('怪物心臟: ' + player.hearts, mx + 30, y); y += 40;

  // Weapons
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 18px monospace';
  ctx.fillText('── 武器 ──', mx + 30, y); y += 28;

  ctx.fillStyle = '#fff';
  ctx.font = '16px monospace';
  // Fist (always available)
  const fistSelected = player.equippedWeapon === null;
  if (fistSelected) ctx.fillStyle = '#4caf50';
  ctx.fillText((fistSelected ? '▶ ' : '  ') + '拳頭 (5-10 dmg, ∞)', mx + 30, y);
  // Click area for fist
  menuClickAreas.push({ x: mx + 30, y: y - 16, w: 400, h: 22, action: () => { player.equippedWeapon = null; } });
  y += 24;

  for (let i = 0; i < player.weapons.length; i++) {
    const w = player.weapons[i];
    const def = WEAPONS[w.type];
    const selected = player.equippedWeapon === i;
    ctx.fillStyle = selected ? '#4caf50' : '#fff';
    const text = (selected ? '▶ ' : '  ') + def.name + ' (' + def.dmgMin + '-' + def.dmgMax + ' dmg, 耐久: ' + w.durability + ')';
    ctx.fillText(text, mx + 30, y);
    const idx = i;
    menuClickAreas.push({ x: mx + 30, y: y - 16, w: 400, h: 22, action: () => { player.equippedWeapon = idx; } });
    y += 24;
  }

  y += 20;
  // Inventory (food items)
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 18px monospace';
  ctx.fillText('── 道具 ──', mx + 30, y); y += 28;

  ctx.font = '16px monospace';
  if (player.inventory.length === 0) {
    ctx.fillStyle = '#888';
    ctx.fillText('  (空)', mx + 30, y);
  } else {
    const grouped = {};
    player.inventory.forEach(item => {
      grouped[item.id] = (grouped[item.id] || 0) + 1;
    });
    for (const [id, count] of Object.entries(grouped)) {
      const def = SHOP_ITEMS.find(s => s.id === id);
      if (def) {
        ctx.fillStyle = '#fff';
        ctx.fillText('  ' + def.name + ' ×' + count + ' (' + def.desc + ')', mx + 30, y);
        menuClickAreas.push({
          x: mx + 30, y: y - 16, w: 400, h: 22,
          action: () => {
            // Use item
            const idx = player.inventory.findIndex(it => it.id === id);
            if (idx >= 0) {
              const item = SHOP_ITEMS.find(s => s.id === id);
              const healAmt = item.heal >= 999 ? player.maxHp - player.hp : item.heal;
              player.hp = Math.min(player.maxHp, player.hp + healAmt);
              player.inventory.splice(idx, 1);
              addFloatingText(player.x, player.y - 50, '+' + healAmt.toFixed(1) + ' ❤', '#e91e63');
              playSfxPickup();
            }
          }
        });
        y += 24;
      }
    }
  }

  // Instructions
  ctx.fillStyle = '#888';
  ctx.font = '14px monospace';
  ctx.fillText('點擊武器切換 | 點擊道具使用 | S 關閉選單', mx + 30, my + mh - 30);
}

// === DRAW SHOP (Fix 3: Beautiful shop with icons) ===
function drawShop() {
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, W, H);

  const sx = 120, sy = 40, sw = W - 240, sh = H - 80;
  shopClickAreas = [];

  // Parchment/wood background (Fix 3e)
  // Outer wood frame
  ctx.fillStyle = '#5d4037';
  ctx.fillRect(sx - 6, sy - 6, sw + 12, sh + 12);
  ctx.fillStyle = '#4e342e';
  ctx.fillRect(sx - 4, sy - 4, sw + 8, sh + 8);

  // Parchment interior
  const pGrad = ctx.createLinearGradient(sx, sy, sx, sy + sh);
  pGrad.addColorStop(0, '#3b2f20');
  pGrad.addColorStop(0.05, '#2a2218');
  pGrad.addColorStop(0.95, '#2a2218');
  pGrad.addColorStop(1, '#3b2f20');
  ctx.fillStyle = pGrad;
  ctx.fillRect(sx, sy, sw, sh);

  // Inner ornamental border
  ctx.strokeStyle = '#c8a86e';
  ctx.lineWidth = 2;
  ctx.strokeRect(sx + 6, sy + 6, sw - 12, sh - 12);
  // Corner ornaments
  const corners = [[sx + 6, sy + 6], [sx + sw - 14, sy + 6], [sx + 6, sy + sh - 14], [sx + sw - 14, sy + sh - 14]];
  ctx.fillStyle = '#c8a86e';
  for (const [cx, cy] of corners) {
    ctx.fillRect(cx, cy, 8, 8);
    ctx.fillRect(cx + 2, cy + 2, 4, 4);
  }

  // Decorative header bar (Fix 3d)
  const headerY = sy + 12;
  const headerH = 42;
  const hGrad = ctx.createLinearGradient(sx + 10, headerY, sx + 10, headerY + headerH);
  hGrad.addColorStop(0, '#5d4037');
  hGrad.addColorStop(0.5, '#6d4c41');
  hGrad.addColorStop(1, '#4e342e');
  ctx.fillStyle = hGrad;
  ctx.fillRect(sx + 10, headerY, sw - 20, headerH);
  ctx.strokeStyle = '#8b6914';
  ctx.lineWidth = 1;
  ctx.strokeRect(sx + 10, headerY, sw - 20, headerH);

  // Merchant icon
  drawShopIconMerchant(ctx, sx + 24, headerY + 5, 32);

  // Shop title
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 22px monospace';
  ctx.fillText('商店 SHOP', sx + 68, headerY + 30);

  // Gold display with coin icon
  drawCoinIcon(ctx, sx + sw - 200, headerY + 12, 20);
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 18px monospace';
  ctx.fillText('' + player.money, sx + sw - 174, headerY + 30);

  // Divider line
  const divY = headerY + headerH + 6;
  ctx.strokeStyle = '#8b6914';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(sx + 20, divY);
  ctx.lineTo(sx + sw - 20, divY);
  ctx.stroke();

  // === BUY SECTION ===
  let y = divY + 20;
  ctx.fillStyle = '#c8a86e';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('─── 購買 BUY ───', sx + 30, y);
  y += 14;

  const cardW = (sw - 60) / 2;
  const cardH = 76;
  const cardPad = 10;
  const iconDrawFuncs = [drawShopIconApple, drawShopIconPorridge, drawShopIconMeat, drawShopIconFish];

  for (let idx = 0; idx < SHOP_ITEMS.length; idx++) {
    const item = SHOP_ITEMS[idx];
    const canBuy = player.money >= item.price;
    const col = idx % 2;
    const row = Math.floor(idx / 2);
    const cardX = sx + 20 + col * (cardW + cardPad);
    const cardY = y + row * (cardH + cardPad);

    // Check hover
    const isHovered = mouse.x >= cardX && mouse.x <= cardX + cardW &&
                      mouse.y >= cardY && mouse.y <= cardY + cardH;

    // Card background (Fix 3b)
    if (canBuy) {
      const cGrad = ctx.createLinearGradient(cardX, cardY, cardX, cardY + cardH);
      cGrad.addColorStop(0, isHovered ? 'rgba(200,168,110,0.3)' : 'rgba(139,105,20,0.15)');
      cGrad.addColorStop(1, isHovered ? 'rgba(200,168,110,0.2)' : 'rgba(139,105,20,0.08)');
      ctx.fillStyle = cGrad;
    } else {
      ctx.fillStyle = 'rgba(60,60,60,0.15)';
    }
    ctx.fillRect(cardX, cardY, cardW, cardH);

    // Card border
    ctx.strokeStyle = isHovered && canBuy ? '#ffd700' : (canBuy ? '#8b6914' : '#444');
    ctx.lineWidth = isHovered && canBuy ? 2 : 1;
    ctx.strokeRect(cardX, cardY, cardW, cardH);

    // Icon area background
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(cardX + 4, cardY + 4, 52, cardH - 8);

    // Draw pixel art icon (Fix 3a)
    iconDrawFuncs[idx](ctx, cardX + 6, cardY + (cardH - 48) / 2, 48);

    // Item name (Chinese + English) (Fix 3b)
    ctx.fillStyle = canBuy ? '#fff' : '#666';
    ctx.font = 'bold 15px monospace';
    ctx.fillText(item.name, cardX + 62, cardY + 20);
    ctx.font = '11px monospace';
    ctx.fillStyle = canBuy ? '#bbb' : '#555';
    ctx.fillText(item.nameEn, cardX + 62, cardY + 34);

    // Price with coin icon (Fix 3b)
    if (canBuy) {
      drawCoinIcon(ctx, cardX + 62, cardY + 42, 14);
      ctx.fillStyle = '#ffd700';
    } else {
      ctx.fillStyle = '#666';
    }
    ctx.font = '13px monospace';
    ctx.fillText(item.price + ' 金幣', cardX + 80, cardY + 54);

    // Effect description
    ctx.fillStyle = canBuy ? '#a5d6a7' : '#555';
    ctx.font = '12px monospace';
    ctx.fillText(item.desc, cardX + 62, cardY + 68);

    if (canBuy) {
      shopClickAreas.push({
        x: cardX, y: cardY, w: cardW, h: cardH,
        action: () => {
          player.money -= item.price;
          player.inventory.push({ id: item.id });
          playSfxBuy();
          addFloatingText(player.x, player.y - 50, '-' + item.price + ' 💰', '#ff5252');

  // === SELL SECTION ===

  ctx.strokeStyle = '#8b6914';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(sx + 20, sellY - 6);
  ctx.lineTo(sx + sw - 20, sellY - 6);

  ctx.fillStyle = '#c8a86e';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('─── 賣出 SELL ───', sx + 30, sellY + 8);

  const sellCardW = (sw - 60) / 2;

    ctx.fillStyle = canSell ? (isHovered ? 'rgba(200,168,110,0.25)' : 'rgba(139,105,20,0.12)') : 'rgba(60,60,60,0.1)';
    ctx.fillRect(cardX, cardY, sellCardW, sellCardH);
    ctx.strokeStyle = isHovered && canSell ? '#ffd700' : (canSell ? '#8b6914' : '#444');
    ctx.lineWidth = isHovered && canSell ? 2 : 1;
    ctx.strokeRect(cardX, cardY, sellCardW, sellCardH);

    // Icon background
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(cardX + 4, cardY + 4, 52, sellCardH - 8);

    drawShopIconTeeth(ctx, cardX + 6, cardY + (sellCardH - 48) / 2, 48);

    ctx.fillStyle = canSell ? '#fff' : '#666';
    ctx.font = 'bold 15px monospace';
    ctx.fillText('怪物牙齒', cardX + 62, cardY + 22);
    ctx.font = '12px monospace';
    ctx.fillStyle = canSell ? '#bbb' : '#555';
    ctx.fillText('Monster Teeth ×' + player.teeth, cardX + 62, cardY + 38);
    ctx.fillStyle = canSell ? '#ffd700' : '#666';
    ctx.font = '13px monospace';
    drawCoinIcon(ctx, cardX + 62, cardY + 44, 14);
    ctx.fillText('10 金幣/個', cardX + 80, cardY + 56);

    if (canSell) {
      shopClickAreas.push({
        x: cardX, y: cardY, w: sellCardW, h: sellCardH,
        action: () => {
          player.money += player.teeth * 10;
          addFloatingText(player.x, player.y - 50, '+' + (player.teeth * 10) + ' 💰', '#ffd700');
          player.teeth = 0;
          playSfxSell();
        }
      });

  }

  // Sell hearts card (Fix 3c)
  {
    const cardX = sx + 20 + sellCardW + cardPad;
    const cardY = sellStartY;
    const canSell = player.hearts > 0;
    const isHovered = mouse.x >= cardX && mouse.x <= cardX + sellCardW &&
                      mouse.y >= cardY && mouse.y <= cardY + sellCardH;

    ctx.fillStyle = canSell ? (isHovered ? 'rgba(200,168,110,0.25)' : 'rgba(139,105,20,0.12)') : 'rgba(60,60,60,0.1)';
    ctx.fillRect(cardX, cardY, sellCardW, sellCardH);
    ctx.strokeStyle = isHovered && canSell ? '#ffd700' : (canSell ? '#8b6914' : '#444');
    ctx.lineWidth = isHovered && canSell ? 2 : 1;
    ctx.strokeRect(cardX, cardY, sellCardW, sellCardH);

    // Icon background
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(cardX + 4, cardY + 4, 52, sellCardH - 8);

    drawShopIconHeart(ctx, cardX + 6, cardY + (sellCardH - 48) / 2, 48);

    ctx.fillStyle = canSell ? '#fff' : '#666';

    ctx.fillText('怪物心臟', cardX + 62, cardY + 22);

    if (canSell) {

// === UPDATE ===
function update() {
  gameTime++;

  if (gameState === 'title' || gameState === 'gameover') return;
  if (gameState === 'menu' || gameState === 'shop') return;

  // Music management
  const inVillage = isInVillage(player.x);
  if (inVillage && lastMusicState !== 'village') {
    playVillageMusic();
    lastMusicState = 'village';
  } else if (!inVillage && lastMusicState !== 'combat') {
    playCombatMusic();
    lastMusicState = 'combat';
  }

  // Player slow timer
  if (player.slowTimer > 0) player.slowTimer--;

  // Player movement
  player.vx = 0;
  const currentSpeed = player.slowTimer > 0 ? PLAYER_SPEED * 0.5 : PLAYER_SPEED;
  if (keys['a']) { player.vx = -currentSpeed; player.facing = -1; }
  if (keys['d']) { player.vx = currentSpeed; player.facing = 1; }
  if (keys['w'] && player.grounded) {
    player.vy = JUMP_FORCE;
    player.grounded = false;
  }

  // Apply gravity
  player.vy += GRAVITY;
  player.y += player.vy;
  player.x += player.vx;

  // Ground collision
  if (player.y >= GROUND_Y) {
    player.y = GROUND_Y;
    player.vy = 0;
    player.grounded = true;
  }

  // World bounds
  player.x = Math.max(20, Math.min(WORLD_WIDTH - 20, player.x));

  // Walk animation
  if (Math.abs(player.vx) > 0.5) {
    player.walkTimer++;
    if (player.walkTimer > 6) {
      player.walkFrame++;
      player.walkTimer = 0;
    }
  } else {
    player.walkFrame = 0;
    player.walkTimer = 0;
  }

  // Attack
  if (player.attackCooldown > 0) player.attackCooldown--;
  if (mouse.clicked && player.attackCooldown <= 0) {
    player.attacking = true;
    player.attackTimer = 15;
    player.attackCooldown = 20;
    playSfxAttack();

    // Hit detection
    const weapon = getEquippedWeapon();
    const reach = weapon.index !== null ? 60 : 40;
    const atkX = player.x + player.facing * reach;
    const atkY = player.y - 30;

    let hitSomething = false;
    for (const m of monsters) {
      // Skip invisible phase monsters
      if (!m.visible) continue;

      const tier = MONSTER_TIERS[m.tierIndex];
      const dist = Math.abs(m.x - atkX);
      const vdist = Math.abs(m.y - atkY);
      const hitRange = reach + m.w / 2;
      if (dist < hitRange && vdist < 50) {
        const dmg = weapon.dmgMin + Math.floor(Math.random() * (weapon.dmgMax - weapon.dmgMin + 1));
        m.hp -= dmg;
        m.hurtTimer = 10;
        m.vx = player.facing * (8 + dmg * 0.3) * (1 - tier.knockbackResist);
        m.vy = -3;

        addFloatingText(m.x, m.y - 60, '-' + dmg, '#ff5252', 22);
        addParticle(m.x, m.y - 30, '#ff8a80', 8, 4);
        playSfxHit();
        screenShake = 5;
        hitSomething = true;

        if (m.hp <= 0) {
          // Monster dies
          player.xp += tier.xp;
          addFloatingText(m.x, m.y - 80, '+' + tier.xp + ' XP', '#7c4dff');
          addParticle(m.x, m.y - 30, tier.color, 15, 5);
          playSfxDeath();
          screenShake = 8;
          killCount++;
          spawnLoot(m.x, m.y, m);

          // Check level up
          const newLevel = Math.floor(player.xp / 100) + 1;
          if (newLevel > player.level) {
            const diff = newLevel - player.level;
            player.level = newLevel;
            player.maxHp += diff;
            player.hp = player.maxHp;
            addLevelUpEffect(player.x, player.y - 30);
            addFloatingText(player.x, player.y - 100, 'LEVEL UP! ❤+' + diff, '#ffd700', 28);
            playSfxLevelUp();
            screenShake = 10;
          }
        }
      }
    }
    if (hitSomething) damageWeapon();
  }
  mouse.clicked = false;

  // Attack timer
  if (player.attacking) {
    player.attackTimer--;
    if (player.attackTimer <= 0) player.attacking = false;
  }

  // Hurt timer
  if (player.hurtTimer > 0) player.hurtTimer--;

  // Remove dead monsters (Fix 1c: in-place)
  compactArray(monsters, m => m.hp > 0);

  // Update monsters
  for (const m of monsters) {
    const tier = MONSTER_TIERS[m.tierIndex];
    const dx = player.x - m.x;
    const dist = Math.abs(dx);

    // Special: phase toggle
    if (tier.special === 'phase') {
      m.phaseTimer++;
      if (m.phaseTimer >= 90) {
        m.visible = !m.visible;
        m.phaseTimer = 0;
      }
    }

    // Special: enrage check
    if (tier.special === 'enrage') {
      m.enraged = m.hp < m.maxHp / 2;
    }

    // Special: particles (fire/lightning)
    if (tier.special === 'particles' && Math.random() < 0.3) {
      const pColor = tier.monsterType === 'giant' ? '#ffeb3b' : (tier.monsterType === 'dragon' ? '#ff6f00' : '#ff5722');
      particles.push({
        x: m.x + (Math.random() - 0.5) * 20,
        y: m.y - 20 - Math.random() * 30,
        vx: (Math.random() - 0.5) * 2,
        vy: -Math.random() * 2 - 0.5,
        life: 15 + Math.random() * 10,
        maxLife: 25,
        color: pColor,
        size: 2 + Math.random() * 3,
      });
    }

    // Compute effective speed
    let effectiveSpeed = tier.speed;
    if (tier.special === 'enrage' && m.enraged) {
      effectiveSpeed *= 2;
    }

    // AI
    if (m.hurtTimer > 0) {
      m.hurtTimer--;
    } else if (dist < tier.attackRange && m.attackCooldown <= 0 && Math.abs(player.y - m.y) < 40) {
      // Attack (vertical check: player must be at roughly same height, not jumping over)
      m.attacking = true;
      m.attackTimer = 20;
      m.attackCooldown = (40 + Math.random() * 20) * (1 / tier.attackSpeed);

      // Damage player
      if (player.hurtTimer <= 0) {
        player.hp -= tier.attack;
        player.hurtTimer = 30;
        player.vx = -Math.sign(dx) * 8;
        player.vy = -5;
        addFloatingText(player.x, player.y - 60, '-' + tier.attack + ' ❤', '#ff1744', 24);
        addParticle(player.x, player.y - 30, '#ff5252', 10, 5);
        playSfxHit();
        screenShake = 8;

        // Special: slow on hit
        if (tier.special === 'slow') {
          player.slowTimer = 60;
          addFloatingText(player.x, player.y - 80, 'SLOWED!', '#4dd0e1', 18);
        }

        if (player.hp <= 0) {
          player.hp = 0;
          gameState = 'gameover';
          stopMusic();
          playSfxDeath();
        }
      }
    } else if (dist < tier.chaseRange) {
      // Chase
      m.state = 'chase';
      m.facing = dx > 0 ? 1 : -1;
      m.vx = m.facing * effectiveSpeed;
    } else {
      // Patrol
      m.state = 'patrol';
      m.patrolTimer--;
      if (m.patrolTimer <= 0) {
        m.patrolDir *= -1;
        m.patrolTimer = 60 + Math.random() * 120;
      }
      m.facing = m.patrolDir;
      m.vx = m.patrolDir * effectiveSpeed * 0.5;
    }

    if (m.attackCooldown > 0) m.attackCooldown--;
    if (m.attacking) {
      m.attackTimer--;
      if (m.attackTimer <= 0) m.attacking = false;
    }

    // Apply physics
    if (tier.flies) {
      // Flying monsters hover at flyHeight above ground
      const targetY = GROUND_Y - tier.flyHeight;
      m.y += (targetY - m.y) * 0.1;
      // Gentle floating motion
      m.y += Math.sin(gameTime * 0.05 + m.x * 0.01) * 0.3;
      m.x += m.vx || 0;
      m.vx *= 0.85;
    } else {
      m.vy = (m.vy || 0) + GRAVITY;
      m.x += m.vx || 0;
      m.y += m.vy || 0;
      if (m.y >= GROUND_Y) { m.y = GROUND_Y; m.vy = 0; }
      m.vx *= 0.85;
    }

    // Walk animation
    if (Math.abs(m.vx) > 0.3) {
      m.walkTimer++;
      if (m.walkTimer > 8) { m.walkFrame++; m.walkTimer = 0; }
    }

    // Don't enter village
    if (isInVillage(m.x)) {
      m.x -= m.vx * 2;
      m.patrolDir *= -1;
    }

    // Mushroom stays still
    if (tier.speed === 0) {
      m.vx = 0;
    }
  }

  // Despawn monsters that are too far away (>2.5 screens)
  for (let i = monsters.length - 1; i >= 0; i--) {
    if (Math.abs(monsters[i].x - player.x) > W * 2.5) {
      monsters.splice(i, 1);
    }
  }

  // Spawn monsters
  if (!isInVillage(player.x)) {
    spawnTimer++;
    // Faster spawning: 60 frames base, even faster when moving
    const isMoving = Math.abs(player.vx) > 2;
    const spawnInterval = isMoving ? 40 : 60;
    if (spawnTimer > spawnInterval && monsters.length < getMaxMonsters()) {
      spawnMonster();
      spawnTimer = 0;
    }
    // Quick respawn when no monsters nearby
    if (monsters.length === 0 && spawnTimer > 15) {
      const count = 1 + Math.floor(Math.random() * 3);
      for (let i = 0; i < count; i++) spawnMonster();
      spawnTimer = 0;
    }
  }

  // Update loot
  for (const item of lootItems) {
    if (!item.grounded) {
      item.vy += GRAVITY * 0.5;
      item.x += item.vx;
      item.y += item.vy;
      if (item.y >= GROUND_Y - 5) {
        item.y = GROUND_Y - 5;
        item.grounded = true;
      }
    }
    item.life--;

    // Pickup
    const dist = Math.abs(item.x - player.x);
    if (dist < 35 && item.grounded) {
      if (item.type === 'teeth') {
        player.teeth++;
        addFloatingText(item.x, item.y - 20, '+牙齒', '#e0e0e0');
        playSfxPickup();
      } else if (item.type === 'heart') {
        player.hearts++;
        addFloatingText(item.x, item.y - 20, '+心臟', '#e91e63');
        playSfxPickup();
      } else if (item.type === 'weapon') {
        player.weapons.push({ type: item.weaponType, durability: WEAPONS[item.weaponType].durability });
        addFloatingText(item.x, item.y - 20, '+' + WEAPONS[item.weaponType].name, WEAPONS[item.weaponType].color);
        playSfxPickup();
        // Auto-equip if better or no weapon
        if (player.equippedWeapon === null) {
          player.equippedWeapon = player.weapons.length - 1;
        }
      }
      item.life = 0;
    }
  }
  // Fix 1c: in-place cleanup
  compactArray(lootItems, i => i.life > 0);

  // Update particles
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life--;
  }
  // Fix 1c: in-place cleanup
  compactArray(particles, p => p.life > 0);

  // Update floating texts
  for (const ft of floatingTexts) {
    ft.y += ft.vy;
    ft.vy *= 0.96;
    ft.life--;
  }
  // Fix 1c: in-place cleanup
  compactArray(floatingTexts, ft => ft.life > 0);

  // Camera
  camera.x += (player.x - W / 2 - camera.x) * 0.1;
  camera.x = Math.max(0, Math.min(WORLD_WIDTH - W, camera.x));

  // Screen shake
  if (screenShake > 0) screenShake--;
}

// === RENDER ===
function render() {
  ctx.save();

  // Screen shake
  if (screenShake > 0) {
    ctx.translate(
      (Math.random() - 0.5) * screenShake * 2,
      (Math.random() - 0.5) * screenShake * 2
    );
  }

  if (gameState === 'title') {
    drawTitle();
    ctx.restore();
    return;
  }

  // Draw world
  drawBackground();
  drawGround();

  // Draw villages
  for (const v of villages) drawVillage(v);

  // Draw loot
  for (const item of lootItems) drawLootItem(item);

  // Draw monsters
  for (const m of monsters) drawMonster(m);

  // Draw player
  const px = player.x - camera.x;
  const py = player.y;
  ctx.save();
  drawPlayer(px, py);
  ctx.restore();

  // Draw particles
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = alpha;
    ctx.fillRect(p.x - camera.x, p.y, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  // Draw floating texts
  for (const ft of floatingTexts) {
    ctx.globalAlpha = Math.min(1, ft.life / 20);
    ctx.fillStyle = ft.color;
    ctx.font = 'bold ' + ft.size + 'px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, ft.x - camera.x, ft.y);
    ctx.textAlign = 'left';
  }
  ctx.globalAlpha = 1;

  // Draw HUD
  drawHUD();

  // Draw overlays
  if (gameState === 'menu') {
    menuClickAreas = [];
    drawMenu();
  }
  if (gameState === 'shop') {
    shopClickAreas = [];
    drawShop();
  }
  if (gameState === 'gameover') {
    drawGameOver();
  }

  ctx.restore();
}

// === CLICK HANDLER FOR MENU/SHOP ===
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  const my = (e.clientY - rect.top) * (H / rect.height);

  if (gameState === 'menu') {
    for (const area of menuClickAreas) {
      if (mx >= area.x && mx <= area.x + area.w && my >= area.y && my <= area.y + area.h) {
        area.action();
        break;
      }
    }
  }

  if (gameState === 'shop') {
    for (const area of shopClickAreas) {
      if (mx >= area.x && mx <= area.x + area.w && my >= area.y && my <= area.y + area.h) {
        area.action();
        break;
      }
    }
  }
});

// === RESET GAME ===
function resetGame() {
  player.x = 400;
  player.y = GROUND_Y;
  player.vx = 0;
  player.vy = 0;
  player.hp = 5;
  player.maxHp = 5;
  player.money = 100;
  player.xp = 0;
  player.level = 1;
  player.facing = 1;
  player.grounded = true;
  player.attacking = false;
  player.attackTimer = 0;
  player.attackCooldown = 0;
  player.walkFrame = 0;
  player.hurtTimer = 0;
  player.slowTimer = 0;
  player.inventory = [];
  player.weapons = [];
  player.equippedWeapon = null;
  player.teeth = 0;
  player.hearts = 0;

  monsters = [];
  particles = [];
  floatingTexts = [];
  lootItems = [];
  killCount = 0;
  spawnTimer = 0;
  screenShake = 0;
  camera.x = 0;
  gameState = 'playing';
  lastMusicState = '';
  playCombatMusic();
}

// === INIT ===
generateVillages();

// === MAIN LOOP (Fix 1e: fixed timestep) ===
function gameLoop(timestamp) {
  if (lastTime === 0) lastTime = timestamp;
  let elapsed = timestamp - lastTime;
  lastTime = timestamp;

  // Cap elapsed to prevent spiral of death
  if (elapsed > 200) elapsed = 200;

  accumulator += elapsed;

  // Run fixed-step updates
  while (accumulator >= FIXED_DT) {
    update();
    accumulator -= FIXED_DT;
  }

  render();
  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);

</script>
